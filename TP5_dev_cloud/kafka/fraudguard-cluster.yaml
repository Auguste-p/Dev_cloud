apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: fraudguard-kafka
  namespace: fraudguard
spec:
  kafka:
    version: 3.7.0
    replicas: 3   # 3 brokers
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      num.partitions: 6
      default.replication.factor: 3
      min.insync.replicas: 2
      # Rétention courte : les transactions sont analysées dans les 24h
      log.retention.hours: 24   # 24
      # Clé de compression pour réduire la bande passante
      compression.type: snappy
    storage:
      type: persistent-claim
      size: 10Gi
      deleteClaim: true
  zookeeper:
    replicas: 0
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# Topics FraudGuard
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transactions-raw
  namespace: fraudguard
  labels:
    strimzi.io/cluster: fraudguard-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "86400000"   # 24h
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: fraud-alerts
  namespace: fraudguard
  labels:
    strimzi.io/cluster: fraudguard-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    # Les alertes sont critiques : rétention 30 jours pour audit
    retention.ms: "2592000000"   # "2592000000" (30 jours)
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: transaction-aggregates
  namespace: fraudguard
  labels:
    strimzi.io/cluster: fraudguard-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    # Topic compacté : garder la dernière valeur par clé (compte_id)
    cleanup.policy: "compact"   # compact
    retention.ms: "604800000"