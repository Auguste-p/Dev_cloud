name: LogiStream — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_REGION: ${{ secrets.GKE_REGION }}
  REGISTRY: europe-west9-docker.pkg.dev

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- PRODUCER ----------
      - name: Setup Node (producer)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TP3_dev_cloud/producer/package-lock.json

      - name: Install deps (producer)
        run: npm ci
        working-directory: TP3_dev_cloud/producer

      - name: Test producer
        run: npm test || echo "No tests for producer"
        working-directory: TP3_dev_cloud/producer

      # ---------- CONSUMER ----------
      - name: Setup Node (consumer)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TP3_dev_cloud/consumer/package-lock.json

      - name: Install deps (consumer)
        run: npm ci
        working-directory: TP3_dev_cloud/consumer

      - name: Test consumer
        run: npm test || echo "No tests for consumer"
        working-directory: TP3_dev_cloud/consumer

      # ---------- K8S VALIDATION ----------
      - name: Valider les manifests Kubernetes
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          ./kubeval TP3_dev_cloud/k8s/*.yaml --ignore-missing-schemas

  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      producer-tag: ${{ steps.tags.outputs.producer-tag }}
      consumer-tag: ${{ steps.tags.outputs.consumer-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Debug repo
        run: echo "${{ github.repository }}"

      - name: Authentification GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: 'kubectl'

      - name: Configurer Docker
        run: gcloud auth configure-docker ${REGISTRY} --quiet

      - name: Générer les tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          echo "producer-tag=${REGISTRY}/${PROJECT_ID}/tp2-registry/gps-producer:${SHA}" >> $GITHUB_OUTPUT
          echo "consumer-tag=${REGISTRY}/${PROJECT_ID}/tp2-registry/tracker-consumer:${SHA}" >> $GITHUB_OUTPUT

      - name: Build & Push Producer
        run: |
          docker buildx build --platform linux/amd64 \
          -t ${{ steps.tags.outputs.producer-tag }} \
          ./TP3_dev_cloud/producer \
          --push

      - name: Build & Push Consumer
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ steps.tags.outputs.consumer-tag }} \
            ./TP3_dev_cloud/consumer \
            --push

  # ============================================
  # Job 1.5 : Scan de sécurité de l'image Docker
  # S'exécute après le build, AVANT le déploiement
  # ============================================
  security-scan:
    name: Scan Vulnérabilités
    runs-on: ubuntu-latest
    needs: build-push   # Dépend du job build-push

    steps:
      - name: Installer Trivy (scanner open-source CVE)
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Authentification GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurer Docker pour Artifact Registry
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      - name: Scanner l'image pour les vulnérabilités critiques
        run: |
          trivy image \
            --exit-code 1   # 1 = échouer si des vulnérabilités sont trouvées
            --severity "CRITICAL,HIGH"  # CRITICAL,HIGH
            --ignore-unfixed \
            --format table \
            ${{ needs.build-push.outputs.image-tag }}

      - name: Générer un rapport SARIF (intégration GitHub Security)
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            ${{ needs.build-push.outputs.image-tag }}

      - name: Uploader le rapport dans GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy sur GKE
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authentification GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'kubectl'

      - name: Configurer kubectl
        run: |
          gcloud container clusters get-credentials ${GKE_CLUSTER} \
            --region=${GKE_REGION} --project=${PROJECT_ID}

      - name: Update Producer
        run: |
          kubectl set image deployment/gps-producer \
            gps-producer=${{ needs.build-push.outputs.producer-tag }} \
            -n logistream

      - name: Update Consumer
        run: |
          kubectl set image deployment/tracker-consumer \
            tracker-consumer=${{ needs.build-push.outputs.consumer-tag }} \
            -n logistream

      - name: Wait rollout
        run: |
          kubectl rollout status deployment/gps-producer -n logistream --timeout=5m
          kubectl rollout status deployment/tracker-consumer -n logistream --timeout=5m

      - name: Vérification
        run: |
          kubectl get pods -n logistream
          kubectl get kafkatopics -n kafka
          echo "Déploiement OK ✓"
